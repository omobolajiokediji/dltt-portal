<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Literacy Training for Teachers - DLTT</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to polyfill fetch in an environment where it's read-only.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Blocked attempt to override window.fetch with:', v);
              }
            });
          }
        } catch (e) {
          console.error('Failed to patch fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
